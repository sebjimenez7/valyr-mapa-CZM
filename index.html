h+='<div class="popup-info"><div class="popup-row"><span class="popup-label">Dirección:</span><span class="popup-value">'+x.d+'</span></div><div class="popup-row"><span class="popup-label">Programa:</span><span class="popup-value">'+x.p+'</span></div><div class="popup-row"><span class="popup-label">Teléfono:</span><span class="popup-value">'+(x.t||'Sin teléfono')+'</span></div></div>';

jefes.forEach(x=>{

c.innerHTML='<div class="jefe-name">'+x.n+'</div><div class="jefe-address">'+x.d+'</div><div class="jefe-meta"><span class="badge">Prog. '+x.p+'</span><span>📞 '+(x.t||'Sin teléfono')+'</span></div>';
c.addEventListener('click',()=>{

});

});
document.getElementById('searchInput').addEventListener('input',e=>{

});
