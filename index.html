            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --accent: #f97316;
            --success: #16a34a;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Work Sans', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px rgba(30, 64, 175, 0.2);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
        }

        .header-content {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .title-group h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 500;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            display: block;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.25rem;
        }

        /* Main Content */
        .content {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100%;
            gap: 0;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 2px solid var(--primary);
            background: linear-gradient(to bottom, #f8fafc, #ffffff);
        }

        .sidebar-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .search-box {
            position: relative;
            margin-top: 1rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .jefes-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .jefe-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .jefe-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.1);
            transform: translateX(4px);
        }

        .jefe-name {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .jefe-address {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .jefe-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .badge {
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        /* Map */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Leaflet Popup Customization */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .leaflet-popup-content {
            font-family: 'Work Sans', sans-serif;
            min-width: 250px;
        }

        .popup-header {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
        }

        .popup-info {
            display: grid;
            gap: 0.5rem;
        }

        .popup-row {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .popup-label {
            font-weight: 600;
            color: var(--text-muted);
        }

        .popup-value {
            color: var(--text);
        }

        .alert-box {
            background: #fef3c7;
            border: 1px solid #fbbf24;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0.5rem;
            font-size: 0.85rem;
        }

        .alert-title {
            font-weight: 600;
            color: #92400e;
            margin-bottom: 0.25rem;
        }

        /* Scrollbar */
        .jefes-list::-webkit-scrollbar {
            width: 8px;
        }

        .jefes-list::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .jefes-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .jefes-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
            .stats-bar {
                gap: 1rem;
            }
            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>

                {"nombre": "Cecilia Posadas Tinoco", "direccion": "C.Martires 7 de Enero s/n", "programa": 188, "telefono": "2727820984", "lat": 18.799507, "lng": -97.186928},
                {"nombre": "Erubiel Santiago Rosas", "direccion": "c.Ricardo Flores Magon #1210", "programa": 190, "telefono": "2722060459", "lat": 18.8013, "lng": -97.190495},
                {"nombre": "Rosa Isela Solares Ramos", "direccion": "Av. Jose Maria Morelos#1105", "programa": 191, "telefono": "2721755656", "lat": 18.808233, "lng": -97.170744},
                {"nombre": "Guadalupe Carrasco Alcantara", "direccion": "Av. Jose Maria Morelos#814", "programa": 192, "telefono": "2721847377", "lat": 18.808233, "lng": -97.170744}
            ];

            // Initialize map
            const map = L.map('map').setView([18.802, -97.189], 15);

            // Add tile layer - Usando CartoDB que funciona mejor localmente
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            // Custom marker icon
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div style="background: #f97316; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px;">📍</div>',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            // Add markers
            const markers = [];
            jefesData.forEach(function(jefe) {
                if (jefe.lat && jefe.lng) {
                    const marker = L.marker([jefe.lat, jefe.lng], { icon: customIcon })
                        .bindPopup(`
                            <div class="popup-header">${jefe.nombre}</div>
                            <div class="popup-info">
                                <div class="popup-row">
                                    <span class="popup-label">Dirección:</span>
                                    <span class="popup-value">${jefe.direccion}</span>
                                </div>
                                <div class="popup-row">
                                    <span class="popup-label">Programa:</span>
                                    <span class="popup-value">${jefe.programa}</span>
                                </div>
                                <div class="popup-row">
                                    <span class="popup-label">Teléfono:</span>
                                    <span class="popup-value">${jefe.telefono}</span>
                                </div>
                            </div>
                        `)
                        .addTo(map);
                    markers.push({ marker: marker, data: jefe });
                }
            });

            // Populate sidebar list
            const jefesList = document.getElementById('jefesList');
            jefesData.forEach(function(jefe) {
                if (jefe.lat && jefe.lng) {
                    const card = document.createElement('div');
                    card.className = 'jefe-card';
                    card.innerHTML = `
                        <div class="jefe-name">${jefe.nombre}</div>
                        <div class="jefe-address">${jefe.direccion}</div>
                        <div class="jefe-meta">
                            <span class="badge">Prog. ${jefe.programa}</span>
                            <span>📞 ${jefe.telefono}</span>
                        </div>
                    `;
                    card.addEventListener('click', function() {
                        map.setView([jefe.lat, jefe.lng], 17);
                        const foundMarker = markers.find(function(m) { 
                            return m.data.programa === jefe.programa; 
                        });
                        if (foundMarker) {
                            foundMarker.marker.openPopup();
                        }
                    });
                    jefesList.appendChild(card);
                }
            });

            // Search functionality
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.jefe-card');
                cards.forEach(function(card) {
                    const text = card.textContent.toLowerCase();
                    card.style.display = text.includes(query) ? 'block' : 'none';
                });
            });
        }
    </script>
</body>
</html>
