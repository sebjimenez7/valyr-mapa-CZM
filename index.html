<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jefes de Manzana - Colonia Obrera | Valyr SGM-CZM</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--primary:#1e40af;--accent:#f97316}body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#f8fafc,#e2e8f0);overflow:hidden;height:100vh}.container{display:grid;grid-template-rows:auto 1fr;height:100vh}header{background:linear-gradient(135deg,#1e3a8a,var(--primary));color:#fff;padding:1.5rem 2rem;box-shadow:0 4px 20px rgba(30,64,175,.2)}.header-content{display:flex;justify-content:space-between;align-items:center}.branding{display:flex;align-items:center;gap:1rem}.logo{width:50px;height:50px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:800;font-size:1.5rem;box-shadow:0 4px 12px rgba(249,115,22,.3)}.title-group h1{font-family:Montserrat,sans-serif;font-weight:800;font-size:1.75rem;letter-spacing:-.5px;margin-bottom:.25rem}.subtitle{font-size:.95rem;opacity:.9;font-weight:500}.stats-bar{display:flex;gap:2rem}.stat{text-align:center}.stat-value{font-family:Montserrat,sans-serif;font-size:2rem;font-weight:800;display:block;line-height:1}.stat-label{font-size:.75rem;opacity:.85;text-transform:uppercase;letter-spacing:.5px;margin-top:.25rem}.content{display:grid;grid-template-columns:350px 1fr;height:100%}.sidebar{background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}.sidebar-header{padding:1.5rem;border-bottom:2px solid var(--primary);background:linear-gradient(to bottom,#f8fafc,#fff)}.sidebar-header h2{font-family:Montserrat,sans-serif;font-weight:700;font-size:1.1rem;color:var(--primary);margin-bottom:.5rem}.search-box{margin-top:1rem}.search-box input{width:100%;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:8px;font-size:.9rem;transition:all .2s}.search-box input:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,64,175,.1)}.jefes-list{flex:1;overflow-y:auto;padding:.5rem}.jefe-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:1rem;margin-bottom:.5rem;cursor:pointer;transition:all .2s}.jefe-card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(30,64,175,.1);transform:translateX(4px)}.jefe-name{font-weight:600;color:var(--primary);margin-bottom:.25rem}.jefe-address{font-size:.85rem;color:#64748b;margin-bottom:.5rem}.jefe-meta{display:flex;gap:1rem;font-size:.8rem;color:#64748b}.badge{background:var(--accent);color:#fff;padding:.2rem .5rem;border-radius:4px;font-weight:600;font-size:.75rem}#map{width:100%;height:100%;z-index:1}.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.15)}.leaflet-popup-content{font-family:'Work Sans',sans-serif;min-width:280px}.popup-header{font-family:Montserrat,sans-serif;font-weight:700;font-size:1.1rem;color:var(--primary);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid var(--primary)}.popup-info{display:grid;gap:.5rem}.popup-row{display:grid;grid-template-columns:80px 1fr;gap:.5rem;font-size:.9rem}.popup-label{font-weight:600;color:#64748b}.popup-value{color:#0f172a}.popup-img{width:100%;height:auto;max-height:200px;object-fit:contain;border-radius:8px;margin:.75rem 0;border:2px solid #e2e8f0}.gmaps-btn{display:inline-block;background:#4285f4;color:#fff;padding:.5rem 1rem;border-radius:6px;text-decoration:none;font-weight:600;font-size:.85rem;margin-top:.75rem;transition:background .2s}.gmaps-btn:hover{background:#357ae8}@media(max-width:1024px){.content{grid-template-columns:1fr}.sidebar{display:none}}</style></head><body><div class="container"><header><div class="header-content"><div class="branding"><div class="logo">V</div><div class="title-group"><h1>Valyr SGM-CZM</h1><div class="subtitle">Sistema de Gestión Municipal - Camerino Z. Mendoza</div></div></div><div class="stats-bar"><div class="stat"><span class="stat-value" id="totalJefes">-</span><span class="stat-label">Jefes de Manzana</span></div><div class="stat"><span class="stat-value" id="totalGeo">-</span><span class="stat-label">Geocodificados</span></div><div class="stat"><span class="stat-value" id="totalINE">-</span><span class="stat-label">Con INE</span></div></div></div></header><div class="content"><aside class="sidebar"><div class="sidebar-header"><h2>Colonia Obrera</h2><p style="font-size:.85rem;color:#64748b;margin-top:.25rem">Directorio completo de jefes de manzana</p><div class="search-box"><input type="text" id="searchInput" placeholder="Buscar por nombre, dirección..."></div></div><div class="jefes-list" id="jefesList"></div></aside><div id="map"></div></div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
fetch('https://tgjfqawufkfebvjljxio.supabase.co/rest/v1/Jefes%20de%20Manzana?colonia=eq.OBRERA&select=b_nombre,apellido_p,apellido_m,direccion,programa,el_no_telefonico,lat,lng,img&order=programa',{headers:{'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnamZxYXd1ZmtmZWJ2amxqeGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE1Mjg0ODUsImV4cCI6MjA0NzEwNDQ4NX0.XqR8LgW9xPLNBfYKX_vQ8kPPzEhJWQp35YPDOxDRmzY','Content-Type':'application/json'}}).then(r=>r.json()).then(data=>{console.log('Datos cargados:',data.length,'jefes');document.getElementById('totalJefes').textContent=data.length;document.getElementById('totalGeo').textContent=data.filter(x=>x.lat&&x.lng).length;document.getElementById('totalINE').textContent=data.filter(x=>x.img).length;const m=L.map('map').setView([18.802,-97.189],15);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri'}).addTo(m);const ic=L.divIcon({className:'custom-marker',html:'<div style="background:#f97316;width:30px;height:30px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-weight:bold;color:white;font-size:12px;">📍</div>',iconSize:[30,30],iconAnchor:[15,15]});const markers=[];data.forEach(x=>{const nombre=x.b_nombre+' '+x.apellido_p+(x.apellido_m?' '+x.apellido_m:'');let h='<div class="popup-header">'+nombre+'</div>';if(x.img){h+='<img src="'+x.img+'" class="popup-img" alt="INE" onerror="this.style.display=\'none\'">';}h+='<div class="popup-info"><div class="popup-row"><span class="popup-label">Dirección:</span><span class="popup-value">'+x.direccion+'</span></div><div class="popup-row"><span class="popup-label">Programa:</span><span class="popup-value">'+x.programa+'</span></div><div class="popup-row"><span class="popup-label">Teléfono:</span><span class="popup-value">'+(x.el_no_telefonico||'Sin teléfono')+'</span></div></div>';h+='<a href="https://www.google.com/maps?q='+x.lat+','+x.lng+'" target="_blank" class="gmaps-btn">📍 Ver en Google Maps</a>';const r=L.marker([x.lat,x.lng],{icon:ic}).bindPopup(h).addTo(m);markers.push({marker:r,data:x})});const l=document.getElementById('jefesList');data.forEach(x=>{const nombre=x.b_nombre+' '+x.apellido_p+(x.apellido_m?' '+x.apellido_m:'');const c=document.createElement('div');c.className='jefe-card';c.innerHTML='<div class="jefe-name">'+nombre+'</div><div class="jefe-address">'+x.direccion+'</div><div class="jefe-meta"><span class="badge">Prog. '+x.programa+'</span><span>📞 '+(x.el_no_telefonico||'Sin teléfono')+'</span></div>';c.addEventListener('click',()=>{m.setView([x.lat,x.lng],17);const f=markers.find(y=>y.data.programa===x.programa);if(f)f.marker.openPopup()});l.appendChild(c)});document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.jefe-card').forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q)?'block':'none'})})}).catch(err=>{console.error('Error cargando datos:',err);alert('Error cargando datos de Supabase. Verifica tu conexión.')});
</script></body></html>
